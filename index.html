    <!-- Google AdSense: script này vừa xác minh site vừa nạp thư viện quảng cáo,
         phải nằm trong <head> tĩnh của index.html để mọi route (SPA) đều có,
         vì SPA chỉ có 1 index.html duy nhất phục vụ toàn bộ path. -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2084765620543624"
     crossorigin="anonymous"></script>

    <!-- JSON-LD @graph: Organization ↔ Person (founder) liên kết 2 chiều qua @id
         để Google Knowledge Graph hiểu rõ AI LÀ NGƯỜI PHÁT TRIỂN vngoweb.
         Tên/trường trong Person phải khớp CHÍNH XÁC text hiển thị ở trang /about. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": ["Organization", "WebSite"],
          "@id": "https://vngoweb.com/#organization",
          "name": "vngoweb",
          "url": "https://vngoweb.com/",
          "logo": "https://vngoweb.com/favicon.png",
          "description": "Nền tảng tạo website chuyên nghiệp cho doanh nghiệp nhỏ tại Việt Nam và quốc tế — chọn mẫu, chỉnh sửa kéo thả, xuất bản ngay không cần biết lập trình.",
          "telephone": "+84347868656",
          "email": "hotro@vngoweb.com",
          "inLanguage": ["vi", "en", "ko", "th", "zh", "lo"],
          "founder": { "@id": "https://vngoweb.com/#founder" },
          "sameAs": []
        },
        {
          "@type": "Person",
          "@id": "https://vngoweb.com/#founder",
          "name": "Nguyễn Văn Tú",
          "jobTitle": "Founder & Developer",
          "url": "https://vngoweb.com/about",
          "telephone": "+84347868656",
          "alumniOf": {
            "@type": "CollegeOrUniversity",
            "name": "Đại học FPT Đà Nẵng"
          },
          "worksFor": { "@id": "https://vngoweb.com/#organization" },
          "knowsAbout": ["Web Development", "SaaS", "Website Builder", "SEO"]
        }
      ]
    }
    </script>
